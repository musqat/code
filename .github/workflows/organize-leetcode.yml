name: Organize LeetCode Problems

on:
  workflow_dispatch:
  push:
    paths:
      - '[0-9][0-9][0-9][0-9]-*/**'

permissions:
  contents: write

jobs:
  move-to-leetcode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Move LeetCode folders to leetcode/
        run: |
          shopt -s nullglob
          mkdir -p leetcode
          for dir in [0-9][0-9][0-9][0-9]-*/; do
            dir="${dir%/}"
            echo "Moving $dir -> leetcode/$dir"
            mv "$dir" "leetcode/$dir"
          done

      - name: Update README files
        run: |
          awk '/<!---LeetCode Topics Start-->/,/<!---LeetCode Topics End-->/' README.md > leetcode/README.md
          sed -i 's|/tree/master/\([0-9]\{4\}-\)|/tree/main/leetcode/\1|g;
                  s|/tree/main/\([0-9]\{4\}-\)|/tree/main/leetcode/\1|g' leetcode/README.md
          printf '# code\n알고리즘 문제풀이 저장소입니다.\n\n## Baekjoon\n\n## Programmers\n\n## LeetCode\n' > README.md

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: move LeetCode problems to leetcode/"
