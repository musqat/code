name: Organize LeetCode Problems

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  move-to-leetcode:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Move LeetCode folders to leetcode/
        run: |
          echo "Current directory contents:"
          ls -la

          mkdir -p leetcode

          found=0
          for d in [0-9][0-9][0-9][0-9]-*; do
            if [ -d "$d" ]; then
              echo "Moving directory: $d"
              mv "$d" "leetcode/" && found=1
            fi
          done

          if [ $found -eq 0 ]; then
            echo "No matching directories found to move"
          fi

      - name: Update README files
        run: |
          awk '/<!---LeetCode Topics Start-->/,/<!---LeetCode Topics End-->/' README.md > leetcode/README.md
          sed -i 's|/tree/master/\([0-9]\{4\}-\)|/tree/main/leetcode/\1|g;
                  s|/tree/main/\([0-9]\{4\}-\)|/tree/main/leetcode/\1|g' leetcode/README.md
          printf '# code\n알고리즘 문제풀이 저장소입니다.\n\n## Baekjoon\n\n## Programmers\n\n## LeetCode\n' > README.md

      - name: Commit & Push changes
        run: |
          if git status --porcelain | grep .; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m "chore: move LeetCode problems to leetcode/"
            git pull --rebase
            git push
          else
            echo "No changes to commit"
          fi
